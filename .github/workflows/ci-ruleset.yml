name: CI Ruleset

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-ruleset-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guardrails:
    name: Guardrails (legacy strict + phase1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Enforce legacy guardrails
        run: npm run ci:legacy-check

      - name: Enforce PRISM Phase 1 guardrails
        run: npm run phase1:check

  tests:
    name: Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run tests in CI mode
        run: npm run test -- --run

      - name: Run regression suite
        run: npm run test:regression

  build:
    name: Build (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
